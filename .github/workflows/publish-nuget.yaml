name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - "*-v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish NuGet
    environment:
      name: production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Resolve package from tag
        id: package
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          component="${tag%-v*}"

          project="$(find "src/Models/${component}" -name "*.csproj" | head -n 1)"

          if [[ -z "$project" ]]; then
            echo "::error::No .csproj found for component '${component}' from tag '${tag}'"
            exit 1
          fi

          echo "project=${project}" >> "$GITHUB_OUTPUT"
          echo "component=${component}" >> "$GITHUB_OUTPUT"

          test -f "$project"

      - name: Pack
        run: |
          dotnet pack "${{ steps.package.outputs.project }}" \
            --configuration Release \
            --output artifacts \
            -p:ContinuousIntegrationBuild=true

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: IvanJosipovic

      - name: Push to NuGet
        run: |
          dotnet nuget push "artifacts/**/*.nupkg" \
            --api-key "${{steps.login.outputs.NUGET_API_KEY}}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: artifacts